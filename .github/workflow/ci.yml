name: ci

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  test-and-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Unit tests
        run: |
          pytest -q

      # Local docs index build (still useful even if web is forced)
      - name: Build local index (from docs/)
        run: |
          python -m src.rag_ingest_local

      - name: Eval smoke gate (WITH WEB)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          EVAL_N: "5"
          MIN_AVG_JUDGE: "0.70"
          MIN_PASS_RATE: "0.60"
        run: |
          python -m src.eval_smoke

      - name: Upload eval artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval_smoke_report
          path: artifacts/eval_smoke_report.json
